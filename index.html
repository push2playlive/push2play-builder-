<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PushPlay Studio AI & Video Platform</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f59e0b" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/nolan/256/youtube-play.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((reg) => console.log("PushPlay PWA Service Worker registered with scope: ", reg.scope))
            .catch((err) => console.error("PushPlay Service Worker registration failed: ", err));
        });
      }
    </script>
  </body>
</html>
